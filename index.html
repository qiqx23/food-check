<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>مرجع حساسية الأكل</title>
<meta name="theme-color" content="#0b1220">
<style>
:root {
  --bg:#0b1220; --bg2:#111827; --card:#182234cc; --line:#ffffff22; --txt:#eef4ff; --muted:#b6c2d8;
  --red:#ef4444; --amber:#f59e0b; --green:#22c55e; --blue:#3b82f6;
}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--txt)}
.wrap{max-width:1100px;margin:auto;padding:16px}
.hero,.card{background:var(--card);border:1px solid var(--line);border-radius:24px;backdrop-filter:blur(10px);box-shadow:0 20px 50px #00000033}
.hero{padding:20px}
.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
.brand{display:flex;gap:12px;align-items:center}
.logo{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#0ea5e9,#2563eb);font-size:28px}
h1,h2,h3,p{margin:0}
.sub{color:var(--muted);margin-top:6px}
.lang{display:flex;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.lang button{border:0;background:transparent;color:var(--txt);padding:10px 14px;font-weight:700;cursor:pointer}
.lang button.active{background:#ffffff1a}
.search{display:grid;grid-template-columns:1fr auto auto;gap:10px;margin-top:16px}
.search input{padding:16px;border-radius:16px;border:1px solid var(--line);background:#ffffff0d;color:var(--txt);font-size:16px;outline:none}
.btn{padding:0 18px;border-radius:16px;border:0;cursor:pointer;font-weight:800;color:#fff;min-height:52px;background:linear-gradient(135deg,#2563eb,#06b6d4)}
.btn.secondary{background:#ffffff12;border:1px solid var(--line)}
.helper{margin-top:10px;color:var(--muted);font-size:14px}
.grid{display:grid;grid-template-columns:1.3fr .9fr;gap:16px;margin-top:16px}
.card{padding:18px}
.empty{padding:28px;text-align:center;color:var(--muted)}
.status{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.pill{display:inline-flex;gap:7px;align-items:center;padding:8px 12px;border-radius:999px;font-size:14px;font-weight:800;border:1px solid transparent}
.pill.red{background:#ef444422;color:#fecaca;border-color:#ef444455}
.pill.amber{background:#f59e0b22;color:#fde68a;border-color:#f59e0b55}
.pill.green{background:#22c55e22;color:#bbf7d0;border-color:#22c55e55}
.pill.blue{background:#3b82f622;color:#bfdbfe;border-color:#3b82f655}
.title{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:flex-start}
.alert{margin:14px 0;padding:14px 16px;border-radius:18px;border:1px solid var(--line);display:flex;gap:12px;align-items:flex-start}
.alert.red{background:#ef44441a} .alert.amber{background:#f59e0b1a} .alert.green{background:#22c55e1a} .alert.blue{background:#3b82f61a}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}
.metric{padding:14px;border-radius:18px;background:#ffffff10;border:1px solid var(--line)}
.metric .label{color:var(--muted);font-size:14px} .metric .value{margin-top:7px;font-size:17px;font-weight:800}
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
.chip{padding:12px;border-radius:14px;border:1px solid var(--line);background:#ffffff0d;color:var(--txt);font-weight:700;cursor:pointer}
.list{display:flex;flex-direction:column;gap:10px;max-height:520px;overflow:auto;margin-top:12px}
.row{padding:12px 14px;border-radius:16px;border:1px solid var(--line);background:#ffffff0d;cursor:pointer}
.row:hover{background:#ffffff18}
.row .main{display:flex;justify-content:space-between;align-items:center;gap:8px}
.row .sub{font-size:13px}
.footer{margin-top:18px;text-align:center;color:var(--muted);font-size:14px}
@media (max-width:860px){.grid{grid-template-columns:1fr} .search{grid-template-columns:1fr 1fr} .search input{grid-column:1/-1} .quick{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="top">
      <div class="brand">
        <div class="logo">🩺</div>
        <div>
          <h1 id="heroTitle">مرجع حساسية الأكل</h1>
          <p class="sub" id="heroSub">ابحث بالعربي أو الإنجليزي، مع أسماء متعددة مثل طماطم / طماط / tomato</p>
        </div>
      </div>
      <div class="lang">
        <button id="arBtn" class="active">العربية</button>
        <button id="enBtn">English</button>
      </div>
    </div>
    <div class="search">
      <input id="searchInput" placeholder="اكتب اسم الأكل..." />
      <button class="btn" id="searchBtn">🔎 بحث</button>
      <button class="btn secondary" id="clearBtn">✖ مسح</button>
    </div>
    <div class="helper" id="helperText">جرب: طماط، خيار، كوسه، peanut، almond، wheat</div>
  </section>

  <section class="grid">
    <div class="card"><div id="resultArea"></div></div>
    <div class="card">
      <h3 id="suggestTitle">اقتراحات سريعة</h3>
      <div class="quick" id="quickChips"></div>
      <h3 style="margin-top:18px" id="matchTitle">نتائج مشابهة</h3>
      <div class="list" id="matchesList"></div>
    </div>
  </section>

  <div class="footer" id="footerText">هذا مرجع سريع مبني على نتائج تقريرك لتسهيل الرجوع من الجوال.</div>
</div>

  "فستق":["فستق","الفستق","pistachio","pistachios"],
  "فول سوداني":["فول سوداني","سوداني","peanut","peanuts","groundnut"],
  "سمسم":["سمسم","sesame","sesame seed","sesame seeds"],
  "قمح":["قمح","wheat"], "جلوتين":["جلوتين","gluten"], "شعير":["شعير","barley"], "حليب":["حليب","milk"],
  "بيض":["بيض","بيضه","بيضة","egg","eggs"], "لبن":["لبن","زبادي","yoghurt","yogurt"], "موز":["موز","banana","bananas"],
  "مانجا":["مانجا","mango","mangoes"], "برتقال":["برتقال","orange","oranges"], "ليمون":["ليمون","lemon","lemons"],
  "تفاح":["تفاح","apple","apples"], "كمثرى":["كمثرى","اجاص","pear","pears"], "فراولة":["فراوله","فراولة","strawberry","strawberries"],
  "عنب":["عنب","grape","grapes"], "رمان":["رمان","pomegranate","pomegranates"], "عدس":["عدس","lentil","lentils"],
  "بازلاء":["بازلاء","بزاليا","pea","peas","green pea","green peas"], "حمص":["حمص","chickpea","chickpeas","garbanzo"],
  "ارز":["رز","أرز","rice"], "ذرة":["ذره","ذرة","corn","maize"], "صويا":["صويا","soy","soybean","soya"],
  "كاجو":["كاجو","cashew","cashews"], "جوز":["جوز","walnut","walnuts"], "بندق":["بندق","hazelnut","hazelnuts"],
  "صنوبر":["صنوبر","pine nut","pine nuts"], "خردل":["خردل","mustard"], "روبيان":["روبيان","جمبري","shrimp","prawn","prawns"],
  "دجاج":["دجاج","chicken"], "تونا":["تونا","tuna"], "سالمون":["سالمون","salmon"], "قهوة":["قهوة","coffee"], "عسل":["عسل","honey"]
};

let currentLang = "ar";
const $ = id => document.getElementById(id);

function currentText(){ return texts[currentLang]; }

function normalizeText(text){
  return String(text || "").trim().toLowerCase().normalize("NFKD")
    .replace(/[\u064B-\u065F\u0670]/g,"")
    .replace(/[أإآ]/g,"ا").replace(/ؤ/g,"و").replace(/ئ/g,"ي").replace(/ى/g,"ي").replace(/ة/g,"ه")
    .replace(/[’´`]/g,"'").replace(/[^a-z0-9\u0600-\u06FF\s]+/g," ").replace(/\s+/g," ").trim();
}

function buildAliases(item){
  const ar = normalizeText(item.ar), en = normalizeText(item.en);
  const aliases = new Set([ar, en, normalizeText(item.code)]);
  [ar, en].forEach(s => s.split(" ").forEach(p => p && aliases.add(p)));
  if(ar){
    aliases.add(ar.replace("حليب ","")); aliases.add(ar.replace("لحم ","")); aliases.add(ar.replace("بذور ",""));
    aliases.add(ar.replace("سمك ","")); aliases.add(ar.replace("جبنه ","")); aliases.add(ar.replace("جبن ",""));
  }
  if(en){
    aliases.add(en.replace("milk ","")); aliases.add(en.replace("cheese ","")); aliases.add(en.replace("seed ",""));
    aliases.add(en.replace("fish ",""));
  }
  Object.entries(manualAliases).forEach(([core, vals]) => {
    const all = [normalizeText(core), ...vals.map(normalizeText)];
    if (all.some(v => v && (ar.includes(v) || en.includes(v)))) all.forEach(v => aliases.add(v));
  });
  return [...aliases].filter(Boolean);
}

const indexedFoods = foods.map(item => ({...item, aliases: buildAliases(item)}));

function severityInfo(cls){
  if(cls >= 5) return {reaction: currentText().yes, strength: currentText().strong, tone:"red", icon:"🚨"};
  if(cls >= 3) return {reaction: currentText().yes, strength: currentText().medium, tone:"amber", icon:"⚠️"};
  if(cls >= 1) return {reaction: currentText().slight, strength: currentText().weak, tone:"green", icon:"🔎"};
  return {reaction: currentText().no, strength: currentText().low, tone:"blue", icon:"✅"};
}

function classRange(cls){
  return {6:">=100",5:">=50 - <100",4:">=17.5 - <50",3:">=3.5 - <17.5",2:">=0.7 - <3.5",1:">=0.35 - <0.7",0:"<0.35"}[cls] || "";
}

function scoreItem(query, item){
  const q = normalizeText(query);
  if(!q) return 0;
  let best = 0;
  for(const alias of item.aliases){
    if(alias === q) best = Math.max(best, 1000);
    else if(alias.startsWith(q)) best = Math.max(best, 900 - (alias.length - q.length));
    else if(alias.includes(q) || q.includes(alias)) best = Math.max(best, 700 - Math.abs(alias.length - q.length));
  }
  if(best === 0){
    const qCompact = q.replace(/\s+/g,'');
    for(const alias of item.aliases){
      const aCompact = alias.replace(/\s+/g,'');
      if(aCompact === qCompact) best = Math.max(best, 850);
      else if(aCompact.startsWith(qCompact) || qCompact.startsWith(aCompact)) best = Math.max(best, 650);
    }
  }
  return best + item.class;
}

function findMatches(query, limit=12){
  const rows = indexedFoods
    .map(item => ({item, score: scoreItem(query, item)}))
    .filter(x => x.score > 0)
    .sort((a,b) => b.score - a.score || b.item.class - a.item.class || a.item.en.localeCompare(b.item.en))
    .slice(0, limit)
    .map(x => x.item);
  return rows;
}

function tonePill(cls){
  const s = severityInfo(cls);
  return `<span class="pill ${s.tone}">${s.icon} ${s.strength}</span>`;
}

function bannerHtml(cls){
  const t = currentText();
  const s = severityInfo(cls);
  const m = {red:t.bannerStrong, amber:t.bannerMedium, green:t.bannerWeak, blue:t.bannerLow}[s.tone];
  return `<div class="alert ${s.tone}"><div style="font-size:1.25rem">${s.icon}</div><div>${m}</div></div>`;
}

function renderResult(item){
  const t = currentText();
  const s = severityInfo(item.class);
  $("resultArea").innerHTML = `
    <div class="status">
      ${tonePill(item.class)}
      <span class="pill blue">🧾 ${t.classLabel} ${item.class}</span>
      <span class="pill blue">📈 ${t.valueLabel} ${item.ku_l}</span>
    </div>
    <div class="title">
      <div>
        <h2>${currentLang === "ar" ? item.ar : item.en}</h2>
        <p class="sub">${currentLang === "ar" ? item.en : item.ar}</p>
      </div>
      <span class="pill ${s.tone}">${s.reaction}</span>
    </div>
    ${bannerHtml(item.class)}
    <div class="metrics">
      <div class="metric"><div class="label">${t.arabicName}</div><div class="value">${item.ar}</div></div>
      <div class="metric"><div class="label">${t.englishName}</div><div class="value">${item.en}</div></div>
      <div class="metric"><div class="label">${t.strength}</div><div class="value">${s.strength}</div></div>
      <div class="metric"><div class="label">${t.reaction}</div><div class="value">${s.reaction}</div></div>
      <div class="metric"><div class="label">${t.rangeLabel}</div><div class="value">${classRange(item.class)}</div></div>
      <div class="metric"><div class="label">${t.codeLabel}</div><div class="value">${item.code}</div></div>
    </div>`;
}

function renderMatches(items){
  const t = currentText();
  if(!items.length) {
    $("matchesList").innerHTML = `<div class="empty">${t.notFound}</div>`;
    return;
  }
  $("matchesList").innerHTML = items.map(item => `
    <div class="row" data-code="${item.code}">
      <div class="main">
        <div><strong>${currentLang === "ar" ? item.ar : item.en}</strong></div>
        ${tonePill(item.class)}
      </div>
      <div class="sub">${currentLang === "ar" ? item.en : item.ar} · Class ${item.class} · ${item.ku_l}</div>
    </div>`).join("");
  document.querySelectorAll(".row").forEach(el => {
    el.onclick = () => {
      const item = indexedFoods.find(x => x.code === el.dataset.code);
      if(item) renderResult(item);
    };
  });
}

function renderEmpty(){
  $("resultArea").innerHTML = `<div class="empty">🍽️ ${currentText().noQuery}</div>`;
  $("matchesList").innerHTML = `<div class="empty">${currentText().similarHint}</div>`;
}

function renderQuick(){
  $("quickChips").innerHTML = currentText().searchExamples.map(w => `<button class="chip" data-word="${w}">${w}</button>`).join("");
  document.querySelectorAll(".chip").forEach(btn => {
    btn.onclick = () => { $("searchInput").value = btn.dataset.word; runSearch(); };
  });
}

function setLanguage(lang){
  currentLang = lang;
  document.documentElement.lang = lang === "ar" ? "ar" : "en";
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
  $("arBtn").classList.toggle("active", lang === "ar");
  $("enBtn").classList.toggle("active", lang === "en");
  const t = currentText();
  $("heroTitle").textContent = t.heroTitle;
  $("heroSub").textContent = t.heroSub;
  $("searchInput").placeholder = t.searchPlaceholder;
  $("searchBtn").textContent = t.searchBtn;
  $("clearBtn").textContent = t.clearBtn;
  $("helperText").textContent = t.helperText;
  $("suggestTitle").textContent = t.suggestTitle;
  $("matchTitle").textContent = t.matchTitle;
  $("footerText").textContent = t.footerText;
  renderQuick();
  renderEmpty();
}

function runSearch(){
  const q = $("searchInput").value.trim();
  if(!q) { renderEmpty(); return; }
  const results = findMatches(q);
  if(!results.length) {
    $("resultArea").innerHTML = `<div class="empty">❌ ${currentText().notFound}</div>`;
    $("matchesList").innerHTML = "";
    return;
  }
  renderResult(results[0]);
  renderMatches(results);
}

window.addEventListener("DOMContentLoaded", () => {
  $("arBtn").onclick = () => setLanguage("ar");
  $("enBtn").onclick = () => setLanguage("en");
  $("searchBtn").onclick = runSearch;
  $("clearBtn").onclick = () => { $("searchInput").value = ""; renderEmpty(); $("searchInput").focus(); };
  $("searchInput").addEventListener("keydown", e => { if(e.key === "Enter") runSearch(); });
  setLanguage("ar");
});
</script>
